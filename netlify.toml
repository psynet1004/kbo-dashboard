# ─────────────────────────────────────────────
# Netlify 배포 설정
# 정적 사이트 + Netlify Function (auth_key 서버측 주입)
# ─────────────────────────────────────────────

[build]
  publish = "."
  functions = "netlify/functions"

# Functions 런타임 (Node 18 → 내장 fetch 사용)
[functions]
  node_bundler = "esbuild"

# 1) 루트(/) → 대시보드
[[redirects]]
  from = "/"
  to = "/kbo-dashboard.html"
  status = 200

# 2) /api/* → Netlify Function (auth_key 자동 주입)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# 3) 보안 헤더
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
