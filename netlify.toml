# ─────────────────────────────────────────────
# Netlify 배포 설정
# 정적 사이트 + Edge Function (auth_key 서버측 주입)
# Edge Function = Netlify 자체 엣지망 실행 (Lambda IP 차단 우회)
# ─────────────────────────────────────────────

[build]
  publish = "."

# 1) 루트 → 대시보드
[[redirects]]
  from = "/"
  to = "/kbo-dashboard.html"
  status = 200

# 2) /api/* 직접 프록시 + auth_key 자동 부착
#    ※ 키 임시 노출 (연결 검증용). 정상 동작 확인 후 키 숨김 처리
[[redirects]]
  from = "/api/*"
  to = "https://data.psynet.co.kr/data3V1/:splat?auth_key=YlXPJojo8hVs5iFeWfZBRE7SJ8cXOUHF"
  status = 200
  force = true

# 3) 보안 헤더
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
