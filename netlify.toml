# ─────────────────────────────────────────────
# Netlify 배포 설정
# 정적 사이트 + Edge Function (auth_key 서버측 주입)
# Edge Function = Netlify 자체 엣지망 실행 (Lambda IP 차단 우회)
# ─────────────────────────────────────────────

[build]
  publish = "."
  edge_functions = "netlify/edge-functions"

# 1) 루트(/) → 대시보드
[[redirects]]
  from = "/"
  to = "/kbo-dashboard.html"
  status = 200

# 2) Edge Function 자동 라우팅
[[edge_functions]]
  function = "api"
  path = "/api/*"

# 3) 보안 헤더
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
